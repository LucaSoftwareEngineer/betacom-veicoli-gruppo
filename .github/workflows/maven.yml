name: Java CI with Maven

on:
  push:
    branches: [ "test/ci" ]
  pull_request:
    branches: [ "test/ci" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Build and test with Maven
      run: mvn clean test -Dtest=SuiteClass
